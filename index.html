<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <search>
                    <form action="">
                        <div class="search-icon">S</div>
                        <input type="search" name="searchbar" id="searchbar">
                    </form>
                </search>
                <div class="top-account-container">
                    <div class="notifications">N</div>
                    <div class="pfp-top">PFP</div>
                    <div class="top-account">name</div>
                </div>
            </div>
            <div class="header-bottom">
                <div class="bottom-account-container">
                    <div class="pfp-bottom">PFP</div>
                    <div class="bottom-account">
                        <div class="welcome-tag">Hi there,</div>
                        <div class="welcome-name">Ethan Hannum</div>
                    </div>
                </div>
                <div class="btns">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-content title">
                <div class="sidebar-text">Dashboard</div>
            </div>
            <nav>
                <div class="sidebar-content home">
                    <div class="sidebar-text">Home</div>
                </div>
                <div class="sidebar-content profile">
                    <div class="sidebar-text">Profile</div>
                </div>
                <div class="sidebar-content messages">
                    <div class="sidebar-text">Messages</div>
                </div>
                <div class="sidebar-content history">
                    <div class="sidebar-text">History</div>
                </div>
                <div class="sidebar-content tasks">
                    <div class="sidebar-text">Tasks</div>
                </div>
                <div class="sidebar-content communities">
                    <div class="sidebar-text">Communities</div>
                </div>
                <div class="sidebar-content settings">
                    <div class="sidebar-text">Settings</div>
                </div>
                <div class="sidebar-content support">
                    <div class="sidebar-text">Support</div>
                </div>
                <div class="sidebar-content privacy">
                    <div class="sidebar-text">Privacy</div>
                </div>
            </nav>
        </div>
        <div class="main-content">MAIN-CONTENT</div>
    </div>
</body>
</html>
